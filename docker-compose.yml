version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: my-app-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    container_name: my-app-backend
    working_dir: /app
    volumes:
      - ./server:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    env_file:
      - .env