<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой день - Трекер привычек</title>
    <meta name="theme-color" content="#4a90e2">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 16px; transition: background 0.3s; }
        body.dark { background: #1a1a1a; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: background 0.3s; }
        body.dark .card { background: #2d2d2d; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
        body.dark h2 { color: #ddd; }
        .nav { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .nav-btn { flex: 1; padding: 12px; background: #e0e0e0; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .nav-btn.active { background: #4a90e2; color: white; }
        body.dark .nav-btn { background: #444; color: #fff; }
        .habit-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        body.dark .habit-item { border-bottom-color: #444; }
        .habit-name { font-size: 16px; font-weight: 500; }
        .habit-points { font-size: 12px; color: #4a90e2; margin-top: 4px; }
        .check-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #4a90e2; background: white; font-size: 24px; cursor: pointer; }
        .check-btn.checked { background: #4a90e2; color: white; }
        .points { font-size: 20px; font-weight: bold; color: #4a90e2; text-align: center; margin-top: 16px; }
        .add-habit-form { margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
        body.dark .add-habit-form { border-top-color: #444; }
        .add-habit-input { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .habit-name-input { flex: 2; padding: 10px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; min-width: 120px; }
        .habit-points-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; min-width: 70px; }
        body.dark .habit-name-input, body.dark .habit-points-input { background: #444; border-color: #555; color: white; }
        .add-habit-btn { padding: 10px 16px; background: #4a90e2; color: white; border: none; border-radius: 12px; cursor: pointer; }
        .delete-habit-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #ff4444; margin-left: 8px; }
        .note-input-group { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .note-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px; min-width: 150px; }
        body.dark .note-input { background: #444; color: white; }
        .add-note-btn { padding: 12px 20px; background: #4a90e2; color: white; border: none; border-radius: 12px; cursor: pointer; }
        .note-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 8px; }
        .delete-note { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .stat-card { background: #f5f5f5; padding: 16px; border-radius: 16px; margin-bottom: 12px; text-align: center; }
        body.dark .stat-card { background: #444; }
        .stat-value { font-size: 32px; font-weight: bold; color: #4a90e2; }
        .theme-btn { width: 100%; padding: 12px; background: #e0e0e0; border: none; border-radius: 12px; margin-top: 8px; cursor: pointer; }
        body.dark .theme-btn { background: #444; color: white; }
        .date-picker { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-top: 8px; }
        body.dark .date-picker { background: #444; color: white; }
        .empty-text { text-align: center; color: #999; padding: 20px; }
        .small-text { font-size: 12px; color: #999; margin-top: 8px; text-align: center; }
        .habit-header { display: flex; justify-content: space-between; align-items: center; }
        .habit-right { display: flex; align-items: center; gap: 8px; }
        .habit-delete { background: none; border: none; font-size: 20px; cursor: pointer; color: #ff4444; padding: 0 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📅 Мой день</h1>
        <div class="nav">
            <button class="nav-btn active" data-tab="habits">✅ Привычки</button>
            <button class="nav-btn" data-tab="notes">📝 Заметки</button>
            <button class="nav-btn" data-tab="stats">📊 Прогресс</button>
        </div>
        <button class="theme-btn" id="themeToggle">🌙 Тёмная тема</button>
    </div>

    <div id="habitsTab" class="tab">
        <div class="card">
            <h2>Привычки на сегодня</h2>
            <div id="habitsList"></div>
            <div class="points">⭐ Баллов: <span id="points">0</span></div>
            
            <div class="add-habit-form">
                <h3 style="font-size: 14px; margin-bottom: 12px;">➕ Добавить привычку</h3>
                <div class="add-habit-input">
                    <input type="text" id="newHabitName" class="habit-name-input" placeholder="Название">
                    <input type="number" id="newHabitPoints" class="habit-points-input" placeholder="Баллы" value="1" min="1">
                    <button id="addHabitBtn" class="add-habit-btn">Добавить</button>
                </div>
            </div>
        </div>
        <div class="card">
            <h2>Выбрать другой день</h2>
            <input type="date" id="datePicker" class="date-picker">
        </div>
    </div>

    <div id="notesTab" class="tab" style="display:none">
        <div class="card">
            <h2>Мои заметки</h2>
            <div class="note-input-group">
                <input type="text" id="noteInput" class="note-input" placeholder="Новая заметка...">
                <button id="addNoteBtn" class="add-note-btn">Добавить</button>
            </div>
            <div id="notesList"></div>
        </div>
    </div>

    <div id="statsTab" class="tab" style="display:none">
        <div class="card">
            <h2>Моя статистика</h2>
            <div id="statsInfo"></div>
        </div>
    </div>
</div>

<script>
    // Данные
    let habits = JSON.parse(localStorage.getItem('habits')) || [
        { id: 1, name: "💧 Вода (8 стаканов)", points: 1 },
        { id: 2, name: "😴 Сон (8 часов)", points: 1 },
        { id: 3, name: "🚶 Прогулка (30 мин)", points: 2 },
        { id: 4, name: "🏋️ Зарядка", points: 2 },
        { id: 5, name: "📚 Чтение (20 мин)", points: 1 }
    ];
    
    let nextId = habits.length > 0 ? Math.max(...habits.map(h => h.id)) + 1 : 1;
    let taskData = JSON.parse(localStorage.getItem('habitData')) || {};
    let notes = JSON.parse(localStorage.getItem('notes')) || [];

    function saveAll() {
        localStorage.setItem('habits', JSON.stringify(habits));
        localStorage.setItem('habitData', JSON.stringify(taskData));
        localStorage.setItem('notes', JSON.stringify(notes));
    }

    function addHabit() {
        let nameInput = document.getElementById('newHabitName');
        let pointsInput = document.getElementById('newHabitPoints');
        let name = nameInput.value.trim();
        let points = parseInt(pointsInput.value) || 1;
        
        if (name === '') {
            alert('Введите название привычки');
            return;
        }
        
        habits.push({ id: nextId++, name: name, points: points });
        saveAll();
        nameInput.value = '';
        pointsInput.value = '1';
        renderHabits();
        renderStats();
    }

    function deleteHabit(habitId) {
        if (confirm('Удалить привычку?')) {
            habits = habits.filter(h => h.id !== habitId);
            for (let date in taskData) {
                if (taskData[date][habitId]) delete taskData[date][habitId];
            }
            saveAll();
            renderHabits();
            renderStats();
        }
    }

    function getToday() { return new Date().toISOString().slice(0,10); }
    let currentDate = getToday();

    function renderHabits() {
        let container = document.getElementById('habitsList');
        if (!container) return;
        let dayData = taskData[currentDate] || {};
        let points = 0;
        let html = '';
        
        habits.forEach(habit => {
            let done = dayData[habit.id];
            if (done) points += habit.points;
            html += `
                <div class="habit-item">
                    <div>
                        <div class="habit-name">${escapeHtml(habit.name)}</div>
                        <div class="habit-points">+${habit.points} баллов</div>
                    </div>
                    <div class="habit-right">
                        <button class="check-btn ${done ? 'checked' : ''}" data-id="${habit.id}">${done ? '✓' : '○'}</button>
                        <button class="habit-delete" data-delete="${habit.id}" title="Удалить привычку">🗑️</button>
                    </div>
                </div>
            `;
        });
        
        if (habits.length === 0) html = '<div class="empty-text">➕ Нажмите "Добавить привычку"</div>';
        container.innerHTML = html;
        document.getElementById('points').innerText = points;
        
        document.querySelectorAll('.check-btn').forEach(btn => {
            btn.onclick = () => {
                let id = parseInt(btn.dataset.id);
                if (!taskData[currentDate]) taskData[currentDate] = {};
                if (taskData[currentDate][id]) delete taskData[currentDate][id];
                else taskData[currentDate][id] = true;
                saveAll();
                renderHabits();
                renderStats();
            };
        });
        
        document.querySelectorAll('.habit-delete').forEach(btn => {
            btn.onclick = () => deleteHabit(parseInt(btn.dataset.delete));
        });
    }

    function renderNotes() {
        let container = document.getElementById('notesList');
        if (!container) return;
        if (notes.length === 0) { container.innerHTML = '<div class="empty-text">📭 Нет заметок</div>'; return; }
        let html = '';
        notes.forEach((note, i) => { html += `<div class="note-item"><span>📝 ${escapeHtml(note.text)}</span><button class="delete-note" data-index="${i}">Удалить</button></div>`; });
        container.innerHTML = html;
        document.querySelectorAll('.delete-note').forEach(btn => { btn.onclick = () => { notes.splice(parseInt(btn.dataset.index), 1); saveAll(); renderNotes(); }; });
    }

    function addNote() { 
        let input = document.getElementById('noteInput'); 
        let text = input.value.trim(); 
        if (text) { 
            notes.unshift({ text: text, date: new Date().toISOString() }); 
            saveAll(); 
            renderNotes(); 
            input.value = ''; 
        } 
    }
    
    function escapeHtml(str) { 
        return str.replace(/[&<>]/g, function(m) { 
            if (m === '&') return '&amp;'; 
            if (m === '<') return '&lt;'; 
            if (m === '>') return '&gt;'; 
            return m; 
        }); 
    }

    function renderStats() {
        let container = document.getElementById('statsInfo');
        if (!container) return;
        let totalCompleted = 0, totalDays = 0;
        for (let [date, day] of Object.entries(taskData)) { 
            totalDays++; 
            totalCompleted += Object.keys(day).length; 
        }
        let avg = totalDays > 0 ? (totalCompleted / totalDays).toFixed(1) : 0;
        container.innerHTML = `
            <div class="stat-card"><div class="stat-value">${totalCompleted}</div><div>✅ выполнено привычек</div></div>
            <div class="stat-card"><div class="stat-value">${totalDays}</div><div>📅 дней с активностью</div></div>
            <div class="stat-card"><div class="stat-value">${avg}</div><div>⭐ привычек в день</div></div>
            <div class="stat-card"><div class="stat-value">${habits.length}</div><div>📋 всего привычек</div></div>
        `;
    }

    let darkMode = localStorage.getItem('darkMode') === 'true';
    function applyTheme() { 
        if (darkMode) { 
            document.body.classList.add('dark'); 
            document.getElementById('themeToggle').innerHTML = '☀️ Светлая тема'; 
        } else { 
            document.body.classList.remove('dark'); 
            document.getElementById('themeToggle').innerHTML = '🌙 Тёмная тема'; 
        } 
    }
    function toggleTheme() { 
        darkMode = !darkMode; 
        localStorage.setItem('darkMode', darkMode); 
        applyTheme(); 
    }

    function switchTab(tab) {
        document.getElementById('habitsTab').style.display = tab === 'habits' ? 'block' : 'none';
        document.getElementById('notesTab').style.display = tab === 'notes' ? 'block' : 'none';
        document.getElementById('statsTab').style.display = tab === 'stats' ? 'block' : 'none';
        document.querySelectorAll('.nav-btn').forEach(btn => { 
            btn.classList.remove('active'); 
            if (btn.dataset.tab === tab) btn.classList.add('active'); 
        });
        if (tab === 'stats') renderStats();
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.nav-btn').forEach(btn => { btn.onclick = () => switchTab(btn.dataset.tab); });
        document.getElementById('addNoteBtn').onclick = addNote;
        document.getElementById('noteInput').onkeypress = (e) => { if (e.key === 'Enter') addNote(); };
        document.getElementById('themeToggle').onclick = toggleTheme;
        document.getElementById('addHabitBtn').onclick = addHabit;
        document.getElementById('newHabitName').onkeypress = (e) => { if (e.key === 'Enter') addHabit(); };
        
        let datePicker = document.getElementById('datePicker');
        datePicker.value = getToday();
        datePicker.onchange = (e) => { currentDate = e.target.value; renderHabits(); };
        
        renderHabits(); 
        renderNotes(); 
        applyTheme();
    });
</script>
</body>
</html>
